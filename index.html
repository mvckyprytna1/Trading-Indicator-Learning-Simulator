<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Simulator</title>
    </head>
<body class="antialiased text-slate-100 flex h-screen overflow-hidden bg-[#08111F]">

    <aside class="w-64 bg-[#0F1B2D] border-r border-slate-800 flex flex-col hidden md:flex z-30">
        <div class="p-4 font-bold text-lg border-b border-slate-800">TRADING SIMULATOR</div>
        
        <nav class="flex-1 p-4 space-y-2" id="desktop-nav">
            <button data-page="dashboard" class="nav-link active-link w-full text-left py-3 px-4 rounded-xl flex items-center gap-3 transition-all duration-200">
                Dashboard
            </button>
            <button data-page="materi" class="nav-link w-full text-left py-3 px-4 rounded-xl flex items-center gap-3 transition-all duration-200">
                Materi Indikator
            </button>
            <button data-page="simulator" class="nav-link w-full text-left py-3 px-4 rounded-xl flex items-center gap-3 transition-all duration-200">
                Simulator Utama
            </button>
            </nav>
    </aside>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0F1B2D] border-t border-slate-800 flex justify-around py-2 z-40 text-[11px]" id="mobile-nav">
        <button data-page="dashboard" class="nav-link flex flex-col items-center gap-1 p-2">
            <span>Dashboard</span>
        </button>
        <button data-page="materi" class="nav-link flex flex-col items-center gap-1 p-2">
            <span>Materi</span>
        </button>
        <button data-page="simulator" class="nav-link flex flex-col items-center gap-1 p-2">
            <span>Simulator</span>
        </button>
    </nav>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-[#0F1B2D] border-b border-slate-800 p-4 flex items-center justify-between z-20 shadow-md">
            <h1 id="current-title" class="text-xl font-semibold">Dashboard</h1>
            <div class="text-sm">Trader Pemula <span class="bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded text-xs ml-1">PEMULA</span></div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 pb-24 md:pb-6 custom-scrollbar transform-gpu">
            
            <section id="page-dashboard" class="page-view space-y-6 transform-gpu transition-all duration-300">
                <div class="bg-[#0F1B2D] p-6 rounded-2xl border border-slate-800">
                    <h2 class="text-lg font-medium mb-2">Selamat Datang di Trading Simulator</h2>
                    <p class="text-slate-400 text-sm">Pilih materi atau simulasi di sidebar untuk memulai belajar.</p>
                </div>
            </section>

            <section id="page-materi" class="page-view space-y-6 hidden transform-gpu transition-all duration-300">
                <div class="bg-[#0F1B2D] p-6 rounded-2xl border border-slate-800">
                    <h2 class="text-lg font-medium">Materi Indikator Saham</h2>
                </div>
            </section>

            <section id="page-simulator" class="page-view space-y-6 hidden transform-gpu transition-all duration-300">
                <div class="bg-[#0F1B2D] p-6 rounded-2xl border border-slate-800">
                    <h2 class="text-lg font-medium">Simulator Trading Utama</h2>
                </div>
            </section>

        </div>
    </main>

    <style>
        .nav-link { color: #94a3b8; }
        .nav-link:hover { color: #f1f5f9; background-color: rgba(255,255,255,0.02); }
        .active-link { color: #38bdf8 !important; background-color: rgba(56, 189, 248, 0.1) !important; font-weight: 500; }
    </style>

    <script src="app.js" type="module"></script>
</body>
</html>
